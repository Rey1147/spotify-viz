<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spotify Dashboard logo" viewBox="0 0 520 120">
  <title>Spotify Dashboard</title>

  <defs>
    <style>
      :root {
        --brand: #1DB954;   /* Spotify green */
        --text:  #cacacaff;   /* Text color */
      }
      .label { font: 700 32px/1.2 Inter, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", Arial, sans-serif; fill: var(--text); }
      .label tspan.thin { font-weight: 500; opacity: .9; }
    </style>
  </defs>

  <g transform="translate(20,20) rotate(90 40 40)">
    <circle cx="40" cy="40" r="36" fill="var(--brand)"/>

    <!-- Дуги в виде ")))" -->
    <path d="M28 30a21 18 0 0 1 24 0" fill="none" stroke="#fff" stroke-width="4.3" stroke-linecap="round"/>
    <path d="M26 40a24 24 0 0 1 28 0" fill="none" stroke="#fff" stroke-width="4.2" stroke-linecap="round"/>
    <path d="M24 50a30 30 0 0 1 32 0" fill="none" stroke="#fff" stroke-width="3.9" stroke-linecap="round"/>
  </g>

  <!-- Подпись -->
  <text class="label" x="118" y="70">
    <tspan>Spotify </tspan><tspan class="thin">Dashboard</tspan>
  </text>
</svg>
